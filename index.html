<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPM - Control de Caja Pro</title>
    <link rel="icon" href="https://fav.farm/📊" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { 
            --primary: #1e293b; --success: #10b981; --info: #3b82f6; 
            --warning: #f59e0b; --danger: #ef4444; --accent: #8b5cf6; 
            --bg: #f1f5f9; --body-font: 'Plus Jakarta Sans', sans-serif;
        }

        body { 
            font-family: var(--body-font); background-color: var(--bg); 
            margin: 0; padding: 10px; height: 100vh; box-sizing: border-box; 
            color: #1e293b; overflow-x: hidden;
        }
        
        /* --- LOGIN CORREGIDO --- */
        #login-screen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: linear-gradient(-45deg, #1e293b, #0f172a, #334155, #1e293b);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; padding: 20px;
        }

        .login-box { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 40px 30px; border-radius: 24px; shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            width: 100%; max-width: 400px; text-align: center; border: 1px solid white;
        }

        .input-group { position: relative; margin-bottom: 20px; width: 100%; }

        /* FIX: Posicionamiento del icono */
        .input-icon {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            font-size: 18px; z-index: 2; pointer-events: none;
        }

        .login-box input { 
            width: 100%; padding: 15px 15px 15px 50px; /* Padding izquierdo aumentado para el icono */
            border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; 
            font-size: 16px; font-family: var(--body-font); background: white;
            position: relative; z-index: 1;
        }

        /* --- RESPONSIVE DESIGN (MÓVIL) --- */
        #app-layout { display: none; margin-top: 10px; }

        .main-layout { 
            display: grid; grid-template-columns: 1fr 1fr 420px; /* Desktop */
            gap: 20px; max-width: 1900px; margin: 0 auto; 
        }

        /* Ajuste para tablets y laptops pequeñas */
        @media (max-width: 1200px) {
            .main-layout { grid-template-columns: 1fr 1fr; }
            .panel-resumen { grid-column: span 2; }
        }

        /* Ajuste para Celulares */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            .main-layout { grid-template-columns: 1fr; display: flex; flex-direction: column; }
            .top-nav { flex-direction: column; gap: 10px; text-align: center; }
            .panel { padding: 15px; border-radius: 15px; }
            #app-layout { height: auto; overflow: visible; }
        }

        /* ESTILOS DE COMPONENTES (IGUALES AL ORIGINAL) */
        .panel { background: white; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; border-top: 5px solid var(--primary); padding: 20px; }
        .panel-ingresos { border-top-color: var(--success); }
        .panel-cuadre { border-top-color: var(--accent); }
        .panel-resumen { border-top-color: var(--info); }
        
        .btn-pegar-unico { width: 100%; padding: 10px; background: #fffbeb; color: #d97706; border: 2px solid #fcd34d; border-radius: 8px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        .btn { width: 100%; padding: 14px; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; text-transform: uppercase; }
        .btn-ingreso { background: var(--success); }
        .btn-cuadre { background: var(--accent); }
        .btn-banco { background: #1e40af; margin-top: 10px; }
        .btn-pdf { background: var(--danger); margin-top: 10px; }

        .total-box { padding: 15px; border-radius: 15px; text-align: center; color: white; margin-bottom: 10px; }
        .bg-reg { background: var(--success); }
        .bg-pto { background: var(--info); }
        .bg-usd { background: var(--accent); }
        
        .scroll-area { max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .item { background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; margin-bottom: 8px; position: relative; }
        .item-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        
        .badge-cantidad { background: var(--bg); color: var(--primary); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        
        #loader { position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: white; padding: 10px 20px; border-radius: 50px; z-index: 10001; display: none; }
        
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>

<div id="loader">🔄 Sincronizando...</div>

<div id="login-screen">
    <div class="login-box">
        <div style="font-size: 40px; margin-bottom: 10px;">📊</div>
        <h1 style="margin:0; font-weight:800;">VPM</h1>
        <p style="color:#64748b; margin-bottom:30px;">Control de Caja Profesional</p>
        
        <div id="login-error" style="display:none; color:red; font-size:12px; margin-bottom:10px;"></div>
        
        <div class="input-group">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" placeholder="Correo electrónico">
        </div>
        
        <div class="input-group">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="Contraseña">
        </div>
        
        <button class="btn btn-ingreso" onclick="iniciarSesion()">Entrar al Sistema</button>
    </div>
    <div style="margin-top:20px; color:white; font-size:12px; opacity:0.8;">
        Desarrollado por <b>Jose</b> | Lanzado por <b>Samuel</b>
    </div>
</div>

<div id="top-bar" style="display:none; background:white; padding:15px; border-radius:15px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
    <div id="user-display" style="font-weight:700; font-size:14px;"></div>
    <button onclick="cerrarSesion()" style="background:#fee2e2; color:#ef4444; border:none; padding:8px 15px; border-radius:8px; font-weight:700; cursor:pointer;">Cerrar Sesión</button>
</div>

<div id="app-layout">
    <div class="main-layout">
        <div class="panel panel-ingresos">
            <h2>Ingresos Bs.</h2>
            <input type="text" id="bs-monto" placeholder="Monto Bs.">
            <input type="text" id="bs-ref" placeholder="Referencia">
            <button class="btn-pegar-unico" onclick="pegarTodoDesdePortapapeles()">📋 PEGAR BANESCO</button>
            <select id="bs-sede">
                <option>Belleza Principal</option><option>Beauty Principal</option><option>Gran Bazar</option><option>Libertador</option>
            </select>
            <button id="btn-bs" class="btn btn-ingreso" onclick="registrarBs()">Guardar Registro</button>
            <hr style="opacity:0.1; margin:20px 0;">
            <div class="scroll-area" id="lista-bs"></div>
        </div>

        <div class="panel panel-cuadre" id="panel-cuadre">
            <h2>Cierres Punto/USD</h2>
            <div id="form-cuadre">
                <select id="c-tipo"><option value="Punto">Cierre Punto (Bs)</option><option value="Dólares">Efectivo ($)</option></select>
                <input type="text" id="c-monto" placeholder="Monto Total">
                <select id="c-sede"><option>Belleza Principal</option><option>Beauty Principal</option><option>Gran Bazar</option><option>Libertador</option></select>
                <button class="btn btn-cuadre" onclick="registrarCuadre()">Registrar Cierre</button>
            </div>
            <div class="scroll-area" id="lista-cuadre" style="margin-top:15px;"></div>
        </div>

        <div class="panel panel-resumen">
            <h2>📊 Resumen</h2>
            <div class="total-box bg-reg"><small>TOTAL REFS</small><div id="tot-reg" style="font-size:20px; font-weight:800;">Bs. 0,00</div></div>
            <div class="total-box bg-pto"><small>CIERRE PUNTOS</small><div id="tot-pto" style="font-size:20px; font-weight:800;">Bs. 0,00</div></div>
            <div class="total-box bg-usd"><small>EFECTIVO USD</small><div id="tot-usd" style="font-size:20px; font-weight:800;">$ 0.00</div></div>
            <div class="scroll-area" id="resumen-final"></div>
            <button class="btn btn-banco" onclick="abrirBanco()">🏦 BANCO</button>
            <button id="btn-pdf" class="btn btn-pdf" style="display:none;" onclick="exportarPDF()">DESCARGAR REPORTE</button>
        </div>
    </div>
</div>

<script type="module">
    // --- AQUÍ VA TU LÓGICA DE FIREBASE INTACTA ---
    // (IMPORTANTE: Copia y pega aquí tus credenciales y funciones de Firebase que ya funcionan)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDZrb6Bt4VQvkcKZO678VqnuLQBeQimTWY",
        authDomain: "fanaticavpm.firebaseapp.com",
        databaseURL: "https://fanaticavpm-default-rtdb.firebaseio.com",
        projectId: "fanaticavpm",
        storageBucket: "fanaticavpm.firebasestorage.app",
        messagingSenderId: "767438396204",
        appId: "1:767438396204:web:5982e46ab3d9f32d496a89",
        measurementId: "G-64607DK1WK"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const ROLES = {
        'belleza@gmail.com': { role: 'user', sede: 'Belleza Principal' },
        'beauty@gmail.com': { role: 'user', sede: 'Beauty Principal' },
        'bazar@gmail.com': { role: 'user', sede: 'Gran Bazar' },
        'libertador@gmail.com': { role: 'user', sede: 'Libertador' },
        'samuel@gmail.com': { role: 'admin', sede: 'Todas' },
        'jose@gmail.com': { role: 'admin', sede: 'Todas' }
    };

    let currentUserProfile = null;
    let localDB = { bs: [], cuadre: [] };

    window.iniciarSesion = () => {
        const e = document.getElementById('email').value.toLowerCase().trim();
        const p = document.getElementById('password').value;
        if(!ROLES[e]) return alert("Usuario no autorizado");
        signInWithEmailAndPassword(auth, e, p).catch(err => alert("Error: " + err.message));
    };

    window.cerrarSesion = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserProfile = ROLES[user.email.toLowerCase()];
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('top-bar').style.display = 'flex';
            document.getElementById('app-layout').style.display = 'block';
            document.getElementById('user-display').innerText = user.email;
            
            if(currentUserProfile.role === 'admin') document.getElementById('btn-pdf').style.display = 'block';
            
            initRealtimeListeners();
        } else {
            location.reload();
        }
    });

    function initRealtimeListeners() {
        onValue(ref(db, 'vpm/bs'), (snap) => {
            localDB.bs = []; snap.forEach(c => { localDB.bs.push({id: c.key, ...c.val()}); });
            renderUI();
        });
        onValue(ref(db, 'vpm/cuadre'), (snap) => {
            localDB.cuadre = []; snap.forEach(c => { localDB.cuadre.push({id: c.key, ...c.val()}); });
            renderUI();
        });
    }

    window.registrarBs = () => {
        const monto = parseFloat(document.getElementById('bs-monto').value.replace(',','.')) || 0;
        const refNum = document.getElementById('bs-ref').value;
        const sede = document.getElementById('bs-sede').value;
        if(!monto || !refNum) return;
        push(ref(db, 'vpm/bs'), { monto, ref: refNum, sede, hora: new Date().toLocaleTimeString() });
        document.getElementById('bs-monto').value = ''; document.getElementById('bs-ref').value = '';
    };

    // ... (El resto de tus funciones como registrarCuadre, renderUI, exportarPDF, etc. van aquí)
    // He omitido el resto por brevedad pero asegúrate de pegarlas todas.
</script>
</body>
</html>
