<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPM - Control de Caja</title>
    <link rel="icon" href="https://fav.farm/📊" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --info: #3498db; --warning: #f39c12; --danger: #d63031; --accent: #16a085; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; overflow: hidden; height: 100vh; box-sizing: border-box; }
        
        /* LOGIN SCREEN STYLES */
        #login-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(135deg, var(--primary), #1a252f); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 350px; text-align: center; }
        .login-box h1 { color: var(--primary); margin: 0 0 5px 0; font-size: 28px; letter-spacing: 2px; }
        .login-box p.subtitle { color: #7f8c8d; font-size: 13px; margin-bottom: 25px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .login-box button { width: 100%; padding: 12px; background: var(--info); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .login-box button:hover { background: #2980b9; }
        .login-footer { margin-top: 30px; color: rgba(255,255,255,0.6); font-size: 11px; text-align: center; line-height: 1.6; }
        .login-footer strong { color: rgba(255,255,255,0.9); }

        /* HEADER NAV */
        .top-nav { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 20px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .user-info { font-weight: bold; color: var(--primary); font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .role-badge { background: var(--warning); color: white; padding: 3px 8px; border-radius: 12px; font-size: 11px; text-transform: uppercase; }
        .role-badge.admin { background: var(--danger); }
        .btn-logout { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }

        /* APP LAYOUT */
        #app-layout { display: none; height: calc(100vh - 80px); }
        .main-layout { display: grid; grid-template-columns: 1fr 1fr 420px; gap: 20px; height: 100%; max-width: 1800px; margin: 0 auto; }
        .panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; border-top: 6px solid var(--primary); }
        .panel-ingresos { border-top-color: var(--success); }
        .panel-cuadre { border-top-color: var(--accent); }
        .panel-resumen { border-top-color: var(--info); }
        
        h2 { margin: 0 0 15px 0; color: var(--primary); font-size: 1.1rem; text-align: center; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; }
        label { font-size: 11px; font-weight: 700; color: #7f8c8d; display: block; margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; font-size: 14px; margin-bottom: 12px; }
        
        .btn-pegar-unico { width: 100%; padding: 8px 12px; background: linear-gradient(135deg, #f39c12, #e67e22); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; text-transform: uppercase; transition: all 0.3s; box-shadow: 0 3px 10px rgba(243, 156, 18, 0.3); margin-bottom: 4px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-pegar-unico:hover { background: linear-gradient(135deg, #e67e22, #d35400); transform: translateY(-1px); box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4); }
        
        .btn { width: 100%; padding: 12px; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; transition: 0.3s; }
        .btn-ingreso { background: var(--success); }
        .btn-cuadre { background: var(--accent); }
        .btn-pdf { background: #e74c3c; margin-top: 10px; box-shadow: 0 4px 12px rgba(231, 76, 60, 0.2); }
        .btn-banco { background: linear-gradient(135deg, #1e40af, #3b82f6); margin-top: 10px; }
        .btn-reset { background: #95a5a6; margin-top: 8px; font-size: 11px; padding: 8px; opacity: 0.8; }
        .btn-reset:hover { opacity: 1; }

        .filtros-box { background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #eee; }
        .filtros-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .filtros-grid input, .filtros-grid select { margin-bottom: 0; font-size: 12px; padding: 8px; }

        .scroll-area { flex-grow: 1; overflow-y: auto; padding-right: 8px; }
        .item { background: #fff; border: 1px solid #edf2f7; padding: 12px; margin-bottom: 10px; border-radius: 10px; position: relative; font-size: 14px; border-left: 5px solid #ccc; }
        .item-bs { border-left-color: var(--success); }
        .item-cuadre { border-left-color: var(--accent); }
        .item-meta { position: absolute; right: 10px; bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .btn-edit { background: #fdf0d5; color: #d4a017; border: none; border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 14px; }
        .btn-del { background: #ffeaa7; color: var(--danger); border: none; border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 14px; }
        .time-label { font-size: 11px; color: #b2bec3; font-weight: 600; }

        .total-box { padding: 12px; border-radius: 12px; text-align: center; color: white; margin-bottom: 8px; }
        .bg-reg { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .bg-pto { background: linear-gradient(135deg, #2980b9, #3498db); }
        .bg-usd { background: linear-gradient(135deg, #8e44ad, #9b59b6); }
        .mask-text { font-size: 14px !important; font-weight: bold; background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 6px; display: inline-block; margin-top: 5px; }
        
        .resumen-sede-card { background: white; border: 1px solid #f0f0f0; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .badge-cantidad { background: var(--info); color: white; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; }
        
        .alert-critica { background: #fff5f5; color: #d63031; padding: 12px; border-radius: 8px; font-size: 12px; font-weight: 800; display: none; margin-bottom: 15px; border: 2px solid #d63031; text-align: center; }
        .pegado-exito { background: #d4edda !important; border-color: #c3e6cb !important; color: #155724; }

        /* Utilities */
        .hidden { display: none !important; }
        .disabled-panel { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
        
        /* Loading Overlay */
        #loader { position: fixed; top: 20px; right: 20px; background: #10b981; color: white; padding: 8px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; z-index: 9999; display: none; box-shadow: 0 4px 15px rgba(16,185,129,0.4); }
    </style>
</head>
<body>

<div id="loader">☁️ Sincronizando...</div>

<div id="login-screen">
    <div class="login-box">
        <h1>VPM</h1>
        <p class="subtitle">Sistema de Control de Caja Pro</p>
        <div id="login-error" style="color: red; font-size: 12px; margin-bottom: 10px; display: none;"></div>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="iniciarSesion()">INGRESAR</button>
    </div>
    <div class="login-footer">
        Desarrollado por <strong>Jose</strong><br>
        Lanzado por <strong>Samuel</strong>
    </div>
</div>

<div id="top-bar" class="top-nav hidden">
    <div class="user-info">
        <span id="user-display">Usuario</span>
        <span id="role-display" class="role-badge">Local</span>
    </div>
    <button class="btn-logout" onclick="cerrarSesion()">CERRAR SESIÓN</button>
</div>

<div id="app-layout">
    <div class="main-layout">
        
        <div class="panel panel-ingresos">
            <h2>Transacciones Bolívares</h2>
            <div id="msg-error-global" class="alert-critica"></div>
            
            <label>Monto</label>
            <input type="text" id="bs-monto" placeholder="0,00">
            
            <label>Referencia</label>
            <input type="text" id="bs-ref" placeholder="Ej: 8844">
            
            <button class="btn-pegar-unico" onclick="pegarTodoDesdePortapapeles()">📋 PEGAR BANESCO</button>
            
            <label>Sede</label>
            <select id="bs-sede">
                <option>Belleza Principal</option>
                <option>Beauty Principal</option>
                <option>Gran Bazar</option>
                <option>Libertador</option>
            </select>
            <button id="btn-bs" class="btn btn-ingreso" onclick="registrarBs()">GUARDAR REGISTRO</button>
            <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
            <div class="filtros-box">
                <div class="filtros-grid">
                    <select id="filtro-sede" onchange="renderUI()">
                        <option value="Todas">Todas las Sedes</option>
                        <option>Belleza Principal</option><option>Beauty Principal</option><option>Gran Bazar</option><option>Libertador</option>
                    </select>
                    <input type="text" id="buscador" onkeyup="renderUI()" placeholder="Buscar Ref...">
                </div>
            </div>
            <div class="scroll-area" id="lista-bs"></div>
        </div>

        <div class="panel panel-cuadre" id="panel-cuadre">
            <h2>Cierres Punto / USD</h2>
            <div id="form-cuadre" style="background: #fcfcfc; padding: 15px; border-radius: 12px; border: 1px solid #edf2f7; margin-bottom: 15px;">
                <label>Tipo</label>
                <select id="c-tipo">
                    <option value="Punto">Cierre de Punto (Bs)</option>
                    <option value="Dólares">Efectivo ($)</option>
                </select>
                <label>Monto Total</label>
                <input type="text" id="c-monto" placeholder="0,00">
                <label>Sede</label>
                <select id="c-sede">
                    <option>Belleza Principal</option><option>Beauty Principal</option><option>Gran Bazar</option><option>Libertador</option>
                </select>
                <button id="btn-cuadre" class="btn btn-cuadre" onclick="registrarCuadre()">REGISTRAR CIERRE</button>
            </div>
            <div class="scroll-area" id="lista-cuadre"></div>
        </div>

        <div class="panel panel-resumen">
            <h2>📊 Resumen Consolidado</h2>
            <div class="total-box bg-reg"><small>TOTAL REFERENCIAS (BS)</small><div id="tot-reg" style="font-size: 1.3rem; font-weight: 900;">Bs. 0,00</div></div>
            <div class="total-box bg-pto"><small>TOTAL CIERRE PUNTOS (BS)</small><div id="tot-pto" style="font-size: 1.3rem; font-weight: 900;">Bs. 0,00</div></div>
            <div class="total-box bg-usd"><small>TOTAL EFECTIVO (USD)</small><div id="tot-usd" style="font-size: 1.3rem; font-weight: 900;">$ 0.00</div></div>
            <div class="scroll-area" id="resumen-final" style="margin-top: 10px;"></div>
            
            <button class="btn btn-banco" onclick="abrirBanco()">🏦 BANCO (BANESCO)</button>
            <button id="btn-pdf" class="btn btn-pdf hidden" onclick="exportarPDF()">DESCARGAR REPORTE PDF</button>
            <button id="btn-reset" class="btn btn-reset hidden" onclick="reiniciarDia()">🗑️ REINICIAR DÍA / LIMPIAR TODO</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // 1. Configuración de Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDZrb6Bt4VQvkcKZO678VqnuLQBeQimTWY",
        authDomain: "fanaticavpm.firebaseapp.com",
        databaseURL: "https://fanaticavpm-default-rtdb.firebaseio.com",
        projectId: "fanaticavpm",
        storageBucket: "fanaticavpm.firebasestorage.app",
        messagingSenderId: "767438396204",
        appId: "1:767438396204:web:5982e46ab3d9f32d496a89",
        measurementId: "G-64607DK1WK"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // 2. Diccionario de Roles y Sedes
    const ROLES = {
        'belleza@gmail.com': { role: 'user', sede: 'Belleza Principal' },
        'beauty@gmail.com': { role: 'user', sede: 'Beauty Principal' },
        'bazar@gmail.com': { role: 'user', sede: 'Gran Bazar' },
        'libertador@gmail.com': { role: 'user', sede: 'Libertador' },
        'samuel@gmail.com': { role: 'admin', sede: 'Todas' },
        'jose@gmail.com': { role: 'admin', sede: 'Todas' }
    };

    // 3. Variables Globales
    let currentUserProfile = null;
    let localDB = { bs: [], cuadre: [] };
    let editandoBsID = null;
    const sedes = ["Belleza Principal", "Beauty Principal", "Gran Bazar", "Libertador"];
    
    // Utilidades
    const fmtBs = (n) => "Bs. " + n.toLocaleString('es-VE', { minimumFractionDigits: 2 });
    const fmtUsd = (n) => "$ " + n.toLocaleString('en-US', { minimumFractionDigits: 2 });
    const showLoader = (show) => document.getElementById('loader').style.display = show ? 'block' : 'none';

    // ==========================================
    // AUTHENTICATION LOGIC
    // ==========================================
    window.iniciarSesion = () => {
        const e = document.getElementById('email').value.toLowerCase().trim();
        const p = document.getElementById('password').value;
        const err = document.getElementById('login-error');
        
        if(!ROLES[e]) {
            err.innerText = "Usuario no autorizado o no existe.";
            err.style.display = "block";
            return;
        }

        signInWithEmailAndPassword(auth, e, p).catch(error => {
            err.innerText = "Error: " + error.message;
            err.style.display = "block";
        });
    };

    window.cerrarSesion = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const email = user.email.toLowerCase();
            currentUserProfile = ROLES[email];
            
            // Configurar UI según rol
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('top-bar').classList.remove('hidden');
            document.getElementById('app-layout').style.display = 'block';
            
            document.getElementById('user-display').innerText = email;
            const badge = document.getElementById('role-display');
            
            if (currentUserProfile.role === 'admin') {
                badge.innerText = 'Administrador';
                badge.classList.add('admin');
                document.getElementById('btn-pdf').classList.remove('hidden');
                document.getElementById('btn-reset').classList.remove('hidden');
                document.getElementById('form-cuadre').classList.remove('disabled-panel');
                document.getElementById('bs-sede').disabled = false;
                document.getElementById('c-sede').disabled = false;
                document.getElementById('filtro-sede').disabled = false;
            } else {
                badge.innerText = currentUserProfile.sede;
                badge.classList.remove('admin');
                // Restricciones de Usuario Local
                document.getElementById('bs-sede').value = currentUserProfile.sede;
                document.getElementById('bs-sede').disabled = true;
                
                document.getElementById('filtro-sede').value = currentUserProfile.sede;
                document.getElementById('filtro-sede').disabled = true;

                // Deshabilitar formulario de cuadre
                document.getElementById('form-cuadre').classList.add('disabled-panel');
            }
            
            initRealtimeListeners();
        } else {
            // Reset UI for logout
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('top-bar').classList.add('hidden');
            document.getElementById('app-layout').style.display = 'none';
            currentUserProfile = null;
        }
    });

    // ==========================================
    // REALTIME DATABASE LOGIC
    // ==========================================
    function initRealtimeListeners() {
        showLoader(true);
        const bsRef = ref(db, 'vpm/bs');
        const cuadreRef = ref(db, 'vpm/cuadre');

        onValue(bsRef, (snapshot) => {
            localDB.bs = [];
            snapshot.forEach(child => {
                localDB.bs.push({ id: child.key, ...child.val() });
            });
            // Ordenar por más reciente (asumiendo inserción cronológica)
            localDB.bs.reverse(); 
            renderUI();
            showLoader(false);
        });

        onValue(cuadreRef, (snapshot) => {
            localDB.cuadre = [];
            snapshot.forEach(child => {
                localDB.cuadre.push({ id: child.key, ...child.val() });
            });
            localDB.cuadre.reverse();
            renderUI();
        });
    }

    // ==========================================
    // LÓGICA DE NEGOCIO Y UI (FIREBASE ADAPTED)
    // ==========================================
    window.registrarBs = () => {
        const montoI = document.getElementById('bs-monto');
        const refI = document.getElementById('bs-ref');
        const monto = parseFloat(montoI.value.toString().replace(/[^\d,]/g, '').replace(',', '.')) || 0;
        const refNum = refI.value.trim();
        const sede = document.getElementById('bs-sede').value;
        const msgError = document.getElementById('msg-error-global');
        
        if (!monto || !refNum) return alert("Faltan datos.");

        // Validación de Duplicados
        const duplicado = localDB.bs.find(x => x.ref === refNum && x.id !== editandoBsID);
        if (duplicado) {
            msgError.innerText = `❌ ERROR: LA REFERENCIA ${refNum} YA EXISTE EN: ${duplicado.sede.toUpperCase()}`;
            msgError.style.display = 'block';
            setTimeout(() => msgError.style.display = 'none', 8000);
            return;
        }

        showLoader(true);
        if (editandoBsID) {
            // Actualizar
            update(ref(db, `vpm/bs/${editandoBsID}`), { monto, ref: refNum, sede })
                .then(() => {
                    editandoBsID = null;
                    document.getElementById('btn-bs').innerText = "GUARDAR REGISTRO";
                });
        } else {
            // Crear nuevo
            const hora = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            push(ref(db, 'vpm/bs'), { monto, ref: refNum, sede, hora, timestamp: Date.now() });
        }
        
        montoI.value = ''; refI.value = ''; msgError.style.display = 'none';
        refI.focus();
    };

    window.registrarCuadre = () => {
        if(currentUserProfile.role !== 'admin') return;

        const montoI = document.getElementById('c-monto');
        const tipo = document.getElementById('c-tipo').value;
        const monto = parseFloat(montoI.value.toString().replace(/[^\d,]/g, '').replace(',', '.')) || 0;
        const sede = document.getElementById('c-sede').value;
        
        if (isNaN(monto) || monto <= 0) return;
        
        showLoader(true);
        push(ref(db, 'vpm/cuadre'), { tipo, monto, sede, timestamp: Date.now() });
        montoI.value = '';
    };

    window.gestionarBs = (id) => {
        const i = localDB.bs.find(x => x.id === id);
        if(!i) return;

        // Validar permisos
        if (currentUserProfile.role !== 'admin' && i.sede !== currentUserProfile.sede) {
            alert("No tienes permisos para editar registros de otras sedes.");
            return;
        }

        if (confirm(`Referencia: ${i.ref}\nOK para EDITAR / Cancelar para ELIMINAR`)) {
            document.getElementById('bs-monto').value = i.monto.toLocaleString('es-VE', { minimumFractionDigits: 2 });
            document.getElementById('bs-ref').value = i.ref;
            if(currentUserProfile.role === 'admin') document.getElementById('bs-sede').value = i.sede;
            editandoBsID = id;
            document.getElementById('btn-bs').innerText = "ACTUALIZAR REGISTRO";
            window.scrollTo(0,0);
        } else if (confirm("¿Eliminar registro de Firebase?")) {
            remove(ref(db, `vpm/bs/${id}`));
        }
    };

    window.eliminarC = (id) => {
        if (currentUserProfile.role !== 'admin') return;
        if (confirm("¿Eliminar cierre de la base de datos?")) {
            remove(ref(db, `vpm/cuadre/${id}`));
        }
    };

    window.reiniciarDia = () => {
        if (currentUserProfile.role !== 'admin') return;
        if (confirm("⚠️ ¿ESTÁS SEGURO?\nEsto borrará TODAS las transacciones y cierres de HOY en la Nube.")) {
            if (confirm("🔒 CONFIRMACIÓN FINAL: ¿Realmente quieres vaciar la base de datos global?")) {
                remove(ref(db, 'vpm/bs'));
                remove(ref(db, 'vpm/cuadre'));
                alert("✅ Base de datos reiniciada.");
            }
        }
    };

    window.renderUI = () => {
        const fSede = document.getElementById('filtro-sede').value;
        const fRef = document.getElementById('buscador').value.toLowerCase();

        // Lista Transacciones (Filtrada visualmente)
        const filtradosBs = localDB.bs.filter(i => (fSede === "Todas" || i.sede === fSede) && i.ref.toLowerCase().includes(fRef));
        
        document.getElementById('lista-bs').innerHTML = filtradosBs.map(i => {
            const canEdit = currentUserProfile.role === 'admin' || i.sede === currentUserProfile.sede;
            return `
            <div class="item item-bs">
                <strong>${i.sede}</strong><br><span style="font-weight:bold; color:var(--success)">${fmtBs(i.monto)}</span><br><small>Ref: ${i.ref}</small>
                <div class="item-meta">
                    <span class="time-label">${i.hora}</span>
                    ${canEdit ? `<button class="btn-edit" onclick="gestionarBs('${i.id}')">✏️</button>` : ''}
                </div>
            </div>`;
        }).join('');

        // Lista Cuadres
        document.getElementById('lista-cuadre').innerHTML = localDB.cuadre.map(i => `
            <div class="item item-cuadre">
                <strong>${i.sede}</strong><br>${i.tipo === 'Punto' ? 'Cierre Punto' : 'Efectivo'}: <b>${i.tipo === 'Dólares' ? fmtUsd(i.monto) : fmtBs(i.monto)}</b>
                ${currentUserProfile.role === 'admin' ? `<div class="item-meta"><button class="btn-del" onclick="eliminarC('${i.id}')">🗑️</button></div>` : ''}
            </div>`).join('');
        
        // Cálculos Resumen
        let tReg = 0, tPto = 0, tUsd = 0;
        const resDiv = document.getElementById('resumen-final'); 
        resDiv.innerHTML = '';
        
        sedes.forEach(s => {
            const trSede = localDB.bs.filter(x => x.sede === s);
            const rS = trSede.reduce((a,b) => a+b.monto, 0);
            const pS = localDB.cuadre.filter(x => x.sede === s && x.tipo === 'Punto').reduce((a,b) => a+b.monto, 0);
            const uS = localDB.cuadre.filter(x => x.sede === s && x.tipo === 'Dólares').reduce((a,b) => a+b.monto, 0);
            tReg += rS; tPto += pS; tUsd += uS;
            
            resDiv.innerHTML += `
                <div class="resumen-sede-card">
                    <div style="flex:1">
                        <strong style="color:var(--primary)">${s}</strong>
                        <div style="font-size:11px; color:#666; margin-top:4px;">
                            Ref: ${fmtBs(rS)} | <b>Cierre Pto: ${fmtBs(pS)}</b><br>
                            Efectivo: <span style="color:var(--accent); font-weight:bold">${fmtUsd(uS)}</span>
                        </div>
                    </div>
                    <div class="badge-cantidad">${trSede.length}</div>
                </div>`;
        });

        // Ocultar totales globales si no es admin
        if(currentUserProfile.role === 'admin'){
            document.getElementById('tot-reg').innerHTML = fmtBs(tReg);
            document.getElementById('tot-pto').innerHTML = fmtBs(tPto);
            document.getElementById('tot-usd').innerHTML = fmtUsd(tUsd);
        } else {
            const lockMsg = '<div class="mask-text">🔒 Permisos Insuficientes</div>';
            document.getElementById('tot-reg').innerHTML = lockMsg;
            document.getElementById('tot-pto').innerHTML = lockMsg;
            document.getElementById('tot-usd').innerHTML = lockMsg;
        }
    };

    // ==========================================
    // UTILIDADES (Portapapeles, Banco, PDF)
    // ==========================================
    window.pegarTodoDesdePortapapeles = async () => {
        try {
            const texto = await navigator.clipboard.readText();
            procesarTextoBanesco(texto);
        } catch(e) {
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Ctrl+V manual';
            btn.style.background = 'linear-gradient(135deg, #e74c3c, #c0392b)';
            setTimeout(() => { btn.innerHTML = originalText; btn.style.background = ''; }, 2000);
        }
    };

    function procesarTextoBanesco(textoCompleto) {
        document.getElementById('bs-ref').value = '';
        document.getElementById('bs-monto').value = '';
        let refEncontrada = null, montoEncontrado = null;
        
        const lineas = textoCompleto.split(/[\r\n]+/).map(l => l.trim()).filter(l => l);
        if (lineas.length >= 2) {
            if (/^\d{8,}$/.test(lineas[0])) refEncontrada = lineas[0];
            if ((lineas[1].includes('.') || lineas[1].includes(',')) && !/^\d{8,}$/.test(lineas[1])) montoEncontrado = lineas[1];
        }
        
        if (!refEncontrada || !montoEncontrado) {
            const partes = textoCompleto.replace(/[\r\n]+/g, ' ').trim().split(/\s+/).filter(p => p);
            if (partes.length >= 2) {
                if (/^\d{8,}$/.test(partes[0]) && !refEncontrada) refEncontrada = partes[0];
                if ((partes[1].includes('.') || partes[1].includes(',')) && !/^\d{8,}$/.test(partes[1]) && !montoEncontrado) montoEncontrado = partes[1];
            }
        }
        
        if (refEncontrada) { document.getElementById('bs-ref').value = refEncontrada; document.getElementById('bs-ref').classList.add('pegado-exito'); }
        if (montoEncontrado) { document.getElementById('bs-monto').value = montoEncontrado; document.getElementById('bs-monto').classList.add('pegado-exito'); }
        
        const exito = (refEncontrada ? 1 : 0) + (montoEncontrado ? 1 : 0);
        const btn = event.target; const originalText = btn.innerHTML;
        btn.innerHTML = `✅ ${exito}/2`; btn.style.background = 'linear-gradient(135deg, #27ae60, #2ecc71)';
        
        setTimeout(() => {
            document.getElementById('bs-ref')?.classList.remove('pegado-exito');
            document.getElementById('bs-monto')?.classList.remove('pegado-exito');
            btn.innerHTML = originalText; btn.style.background = '';
            if (exito === 2) document.getElementById('btn-bs').scrollIntoView({ behavior: 'smooth' });
        }, 2000);
    }

    window.abrirBanco = () => {
        window.open('https://www.banesconline.com/Mantis/WebSite/login.aspx', 'banesco', 'width=1200,height=800,scrollbars=yes,resizable=yes');
    };

    window.exportarPDF = () => {
        if (currentUserProfile.role !== 'admin') return;
        if (typeof window.jspdf === 'undefined') return alert('Error: jsPDF no cargó.');
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(18); doc.setTextColor(44, 62, 80); doc.text("REPORTE CONSOLIDADO DE CAJA", 14, 20);
        doc.setFontSize(10); doc.setTextColor(100); doc.text(`Generado: ${new Date().toLocaleString('es-VE')}`, 14, 28);
        doc.setFontSize(14); doc.setTextColor(52, 152, 219); doc.text("RESUMEN GENERAL POR SEDE", 14, 40);
        
        const resumenCuerpo = sedes.map(s => {
            const rS = localDB.bs.filter(x => x.sede === s).reduce((a,b) => a+b.monto, 0);
            const pS = localDB.cuadre.filter(x => x.sede === s && x.tipo === 'Punto').reduce((a,b) => a+b.monto, 0);
            const uS = localDB.cuadre.filter(x => x.sede === s && x.tipo === 'Dólares').reduce((a,b) => a+b.monto, 0);
            return [s, fmtBs(rS), fmtBs(pS), fmtUsd(uS)];
        });

        doc.autoTable({ startY: 50, head: [['Sede', 'Total Refs (Bs)', 'Cierre Punto (Bs)', 'Efectivo ($)']], body: resumenCuerpo, theme: 'striped', headStyles: { fillColor: [52, 152, 219] }, styles: { fontSize: 8 } });
        let finalY = doc.lastAutoTable.finalY + 15;
        
        doc.setFontSize(14); doc.setTextColor(39, 174, 96); doc.text("DETALLE DE TRANSACCIONES (BS)", 14, finalY);
        doc.autoTable({ startY: finalY + 8, head: [['Sede', 'Hora', 'Referencia', 'Monto']], body: localDB.bs.map(x => [x.sede, x.hora, x.ref, fmtBs(x.monto)]), headStyles: { fillColor: [39, 174, 96] }, styles: { fontSize: 7 }, columnStyles: { 0: { cellWidth: 40 }, 1: { cellWidth: 25 }, 2: { cellWidth: 50 }, 3: { cellWidth: 45 } } });

        window.open(doc.output('bloburl'), '_blank');
    };
</script>
