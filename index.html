<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPM - Control de Caja Pro</title>
    <link rel="icon" href="https://fav.farm/📊" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* --- VARIABLES Y ESTILOS BASE --- */
        :root { 
            --primary: #1e293b; --primary-dark: #0f172a; --success: #10b981; 
            --info: #3b82f6; --warning: #f59e0b; --danger: #ef4444; 
            --accent: #8b5cf6; --bg: #f8fafc; --surface: #ffffff; 
            --text: #334155; --text-light: #64748b; --border: #e2e8f0; 
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; padding: 15px; height: 100vh; box-sizing: border-box; overflow: hidden;
        }
        
        /* --- LAYOUT PRINCIPAL --- */
        .main-layout { 
            display: grid; grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr) 380px; 
            gap: 20px; height: 100%; max-width: 1920px; margin: 0 auto; 
        }
        
        .panel { 
            background: var(--surface); padding: 20px; border-radius: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03), 0 1px 3px rgba(0,0,0,0.05); 
            display: flex; flex-direction: column; overflow: hidden; border-top: 5px solid var(--primary); 
        }
        .panel-ingresos { border-top-color: var(--success); }
        .panel-gastos { border-top-color: var(--warning); }
        .panel-resumen { border-top-color: var(--info); }
        
        h2 { 
            margin: 0 0 20px 0; color: var(--primary-dark); font-size: 1.15rem; 
            display: flex; align-items: center; gap: 8px; font-weight: 700; 
        }
        
        /* --- FORMULARIOS --- */
        .input-group { margin-bottom: 15px; }
        label { font-size: 12px; font-weight: 600; color: var(--text-light); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { 
            width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; 
            box-sizing: border-box; font-size: 14px; font-family: inherit; color: var(--text);
            transition: all 0.2s; background-color: #f8fafc;
        }
        input:focus, select:focus { outline: none; border-color: var(--info); background-color: white; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        /* --- BOTONES --- */
        .btn { 
            width: 100%; padding: 14px; color: white; border: none; border-radius: 12px; cursor: pointer; 
            font-weight: 700; font-size: 14px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; 
        }
        .btn:active { transform: scale(0.98); }
        .btn-ingreso { background: var(--success); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-ingreso:hover { background: #059669; }
        .btn-gasto { background: var(--warning); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2); }
        .btn-gasto:hover { background: #d97706; }
        
        .btn-pegar-unico {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #1e293b, #334155); 
            color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 13px; 
            transition: all 0.2s; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-pegar-unico:hover { background: linear-gradient(135deg, #0f172a, #1e293b); }
        
        /* --- LISTAS Y SCROLL --- */
        .scroll-area { flex-grow: 1; overflow-y: auto; padding-right: 5px; margin-top: 10px; }
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-track { background: transparent; }
        .scroll-area::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        
        .item { 
            background: white; border: 1px solid var(--border); padding: 14px; margin-bottom: 12px; 
            border-radius: 12px; position: relative; display: flex; flex-direction: column; gap: 4px; 
            transition: all 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .item:hover { border-color: #cbd5e1; box-shadow: 0 4px 6px rgba(0,0,0,0.04); }
        .item-bs { border-left: 4px solid var(--success); }
        .item-gasto { border-left: 4px solid var(--warning); }

        .item-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .item-sede { font-weight: 700; font-size: 13px; color: var(--primary-dark); }
        .item-monto { font-weight: 800; font-size: 16px; }
        .monto-bs { color: var(--success); }
        .monto-gasto { color: var(--warning); }
        
        .item-details { font-size: 13px; color: var(--text-light); }
        
        .item-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); }
        .time-label { font-size: 11px; font-weight: 600; color: #94a3b8; display: flex; align-items: center; gap: 4px; }
        
        .btn-action { background: #f1f5f9; border: none; border-radius: 6px; padding: 6px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-action:hover { background: #e2e8f0; }
        .btn-edit { color: var(--info); }
        .btn-delete { color: var(--danger); background: #fef2f2; }
        .btn-delete:hover { background: #fee2e2; }

        /* --- FILTROS --- */
        .filtros-box { background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid var(--border); display: flex; gap: 10px; margin-bottom: 5px; }
        .filtros-box select, .filtros-box input { margin-bottom: 0; padding: 8px 12px; font-size: 13px; }
        
        /* --- RESUMEN --- */
        .total-card { 
            padding: 16px; border-radius: 16px; margin-bottom: 12px; color: white; 
            display: flex; flex-direction: column; gap: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .bg-ingresos { background: linear-gradient(135deg, var(--success), #059669); }
        .bg-gastos { background: linear-gradient(135deg, var(--warning), #d97706); }
        .total-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.9; }
        .total-monto { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }

        .resumen-sede-card { 
            background: white; border: 1px solid var(--border); padding: 14px; 
            border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; 
        }
        .resumen-sede-info { flex: 1; }
        .resumen-sede-nombre { font-weight: 700; color: var(--primary-dark); font-size: 14px; margin-bottom: 4px; }
        .resumen-sede-cifras { font-size: 12px; color: var(--text-light); line-height: 1.5; }
        .badge-cantidad { 
            background: var(--info); color: white; width: 36px; height: 36px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; 
        }
        
        .action-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-pdf { background: var(--primary); box-shadow: 0 4px 12px rgba(30, 41, 59, 0.2); }
        .btn-pdf:hover { background: var(--primary-dark); }
        .btn-banco { background: var(--info); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); }
        .btn-banco:hover { background: #2563eb; }
        .btn-reset { background: white; color: var(--text-light); border: 1px solid var(--border); }
        .btn-reset:hover { background: #f1f5f9; color: var(--text); }
        .btn-danger { background: var(--danger); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background: #dc2626; }

        /* ESTILOS DEL BOTON Y MODAL ADMIN */
        .btn-admin { 
            background: #8e44ad; color: white; border: none; padding: 12px; border-radius: 10px; 
            cursor: pointer; font-weight: bold; font-size: 13px; text-transform: uppercase; width: 100%; 
            transition: all 0.3s; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 12px rgba(142, 68, 173, 0.3);
        }
        .btn-admin:hover { background: #732d91; transform: translateY(-2px); }
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.8); z-index: 10000; justify-content: center; align-items: center; 
            backdrop-filter: blur(4px); 
        }
        .modal-content { 
            background: white; padding: 25px; border-radius: 16px; width: 90%; max-width: 350px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); position: relative; border-top: 6px solid #8e44ad; 
        }
        .btn-close-modal { 
            position: absolute; top: 12px; right: 15px; background: none; border: none; 
            font-size: 20px; cursor: pointer; color: #64748b; transition: 0.2s; 
        }
        .btn-close-modal:hover { color: #0f172a; }

        /* --- UTILIDADES --- */
        .alert-error { 
            background: #fef2f2; color: var(--danger); padding: 12px; border-radius: 10px; 
            font-size: 13px; font-weight: 700; display: none; margin-bottom: 15px; border: 1px solid #fca5a5; text-align: center; 
        }
        .pegado-exito { animation: pulseGreen 0.6s ease; background-color: #ecfdf5 !important; border-color: #10b981 !important; }
        @keyframes pulseGreen { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        
        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .notification { 
            background: white; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px;
            animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-left: 4px solid var(--info);
        }
        .notif-success { border-left-color: var(--success); }
        .notif-error { border-left-color: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg);
            z-index: 10000; display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%; max-width: 350px; text-align: center;
        }
        .login-box h1 { margin: 0 0 5px 0; color: var(--primary-dark); font-size: 24px; }
        .login-box p { color: var(--text-light); font-size: 14px; margin-bottom: 25px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h1>VPM Caja Pro</h1>
        <p>Inicia sesión para continuar</p>
        <div class="input-group" style="text-align: left;">
            <label>Usuario o Email</label>
            <input type="text" id="login-email" placeholder="ej: cajero1 o admin@vpm.com">
        </div>
        <div class="input-group" style="text-align: left;">
            <label>Contraseña</label>
            <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button class="btn btn-pdf" onclick="login()">Iniciar Sesión</button>
        <div id="login-error" class="alert-error" style="margin-top: 15px;"></div>
    </div>
</div>

<div id="notification-container"></div>

<div class="main-layout" id="app-content" style="display: none;">
    <div class="panel panel-ingresos">
        <h2>💰 Ingresos Banesco</h2>
        <div id="msg-error-global" class="alert-error"></div>
        
        <div class="filtros-box">
            <select id="bs-sede">
                <option>Belleza Principal</option><option>Beauty Principal</option>
                <option>Gran Bazar</option><option>Libertador</option>
            </select>
        </div>

        <button class="btn-pegar-unico" onclick="pegarTodoDesdePortapapeles()">📋 Autocompletar desde Portapapeles</button>
        
        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 10px;">
            <div class="input-group">
                <label>Monto</label>
                <input type="text" id="bs-monto" placeholder="0,00">
            </div>
            <div class="input-group">
                <label>Referencia</label>
                <input type="text" id="bs-ref" placeholder="Ej: 60610518732">
            </div>
        </div>
        
        <button id="btn-bs" class="btn btn-ingreso" onclick="registrarBs()">Guardar Ingreso</button>
        
        <hr style="border:0; border-top:1px dashed var(--border); margin:15px 0;">
        
        <div class="filtros-box">
            <select id="filtro-sede-bs" onchange="actualizarUI()" style="flex:1">
                <option value="Todas">Todas las Sedes</option>
                <option>Belleza Principal</option><option>Beauty Principal</option>
                <option>Gran Bazar</option><option>Libertador</option>
            </select>
            <input type="text" id="buscador-bs" onkeyup="actualizarUI()" placeholder="Buscar Ref..." style="flex:1">
        </div>
        <div class="scroll-area" id="lista-bs"></div>
    </div>

    <div class="panel panel-gastos">
        <h2>💸 Registro de Gastos</h2>
        
        <div class="filtros-box">
            <select id="g-sede">
                <option>Belleza Principal</option><option>Beauty Principal</option>
                <option>Gran Bazar</option><option>Libertador</option><option>General / Adm</option>
            </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="input-group">
                <label>Monto</label>
                <input type="text" id="g-monto" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Moneda</label>
                <select id="g-moneda">
                    <option value="BS">Bolívares (Bs)</option>
                    <option value="USD">Dólares ($)</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Categoría</label>
            <select id="g-tipo">
                <option>Nómina / Pagos a Personal</option>
                <option>Insumos / Mercancía</option>
                <option>Servicios Básicos (Luz, Agua, Internet)</option>
                <option>Mantenimiento / Reparaciones</option>
                <option>Comida / Refrigerios</option>
                <option>Otros Gastos</option>
            </select>
        </div>

        <div class="input-group">
            <label>Descripción / Concepto</label>
            <input type="text" id="g-concepto" placeholder="Ej: Pago quincena Maria">
        </div>

        <button id="btn-gasto" class="btn btn-gasto" onclick="registrarGasto()">Registrar Gasto</button>
        
        <hr style="border:0; border-top:1px dashed var(--border); margin:15px 0;">
        <div class="filtros-box">
            <select id="filtro-sede-g" onchange="actualizarUI()">
                <option value="Todas">Todas las Sedes</option>
                <option>Belleza Principal</option><option>Beauty Principal</option>
                <option>Gran Bazar</option><option>Libertador</option><option>General / Adm</option>
            </select>
        </div>
        <div class="scroll-area" id="lista-gastos"></div>
    </div>

    <div class="panel panel-resumen">
        <h2>📊 Resumen del Día</h2>
        
        <div class="total-card bg-ingresos">
            <span class="total-title">Total Ingresos Banesco (BS)</span>
            <span class="total-monto" id="tot-ingresos">Bs. 0,00</span>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="total-card bg-gastos">
                <span class="total-title">Gastos (BS)</span>
                <span class="total-monto" id="tot-gastos-bs" style="font-size:1.3rem;">Bs. 0,00</span>
            </div>
            <div class="total-card bg-gastos" style="background: linear-gradient(135deg, #e11d48, #be123c);">
                <span class="total-title">Gastos ($)</span>
                <span class="total-monto" id="tot-gastos-usd" style="font-size:1.3rem;">$ 0.00</span>
            </div>
        </div>
        
        <div class="scroll-area" id="resumen-final" style="margin-bottom: 15px;"></div>
        
        <div class="action-buttons">
            <button class="btn btn-pdf" onclick="exportarPDF()">📄 Descargar Reporte PDF</button>
            <button class="btn btn-banco" onclick="abrirBanco()">🏦 Acceso a Banesco</button>
            <button class="btn-admin" onclick="abrirModalAdmin()">👤 Crear Cajero</button>
            <button class="btn btn-reset" onclick="logout()">🚪 Desconectar</button>
            <button class="btn btn-danger" style="font-size: 11px; padding: 10px;" onclick="reiniciarDia()">🗑️ LIMPIAR TODO (Solo Local)</button>
        </div>
    </div>
</div>

<div id="modal-admin" class="modal-overlay">
    <div class="modal-content">
        <button class="btn-close-modal" onclick="cerrarModalAdmin()">✖</button>
        <h2 style="color: #8e44ad; text-align: left; margin-bottom: 20px; font-size: 1.2rem; margin-top: 0;">Registrar Nuevo Usuario</h2>

        <div class="input-group">
            <label>Nombre de Usuario (Sin espacios)</label>
            <input type="text" id="nuevo-username" placeholder="ej: maria_caja1" autocomplete="off">
        </div>

        <div class="input-group">
            <label>Contraseña (Mínimo 6 caracteres)</label>
            <input type="password" id="nuevo-password" placeholder="••••••">
        </div>

        <div class="input-group">
            <label>Rol / Permiso</label>
            <select id="nuevo-rol">
                <option value="cajero">Cajero Base</option>
                <option value="admin">Administrador</option>
            </select>
        </div>

        <button class="btn-admin" style="margin-top: 5px;" onclick="ejecutarRegistroUsuario()">REGISTRAR USUARIO</button>
    </div>
</div>

<script type="module">
    // --- IMPORTACIONES DE FIREBASE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, getAuth as getAuthSecondary, onAuthStateChanged, signInWithEmailAndPassword, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    // --- CONFIGURACIÓN DE FIREBASE (Reemplaza con tus datos reales) ---
    const firebaseConfig = {
      apiKey: "AIzaSyA_TU_API_KEY_AQUI",
      authDomain: "tu-proyecto.firebaseapp.com",
      projectId: "tu-proyecto",
      storageBucket: "tu-proyecto.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcdef"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Inicializar app secundaria para creación de usuarios (No desloguea al admin)
    const secondaryApp = initializeApp(firebaseConfig, "SecondaryApp");
    const secondaryAuth = getAuthSecondary(secondaryApp);

    // --- VARIABLES GLOBALES ---
    const sedes = ["Belleza Principal", "Beauty Principal", "Gran Bazar", "Libertador", "General / Adm"];
    const fmtBs = (n) => "Bs. " + parseFloat(n).toLocaleString('es-VE', { minimumFractionDigits: 2 });
    const fmtUsd = (n) => "$ " + parseFloat(n).toLocaleString('en-US', { minimumFractionDigits: 2 });
    
    let localDB = { bs: [], gastos: [] };
    let editandoBsID = null;
    let currentUser = null;
    let unsubscribeBs = null;
    let unsubscribeGastos = null;

    // --- SISTEMA DE NOTIFICACIONES ---
    window.showNotification = (message, type = 'success') => {
        const container = document.getElementById('notification-container');
        const notif = document.createElement('div');
        notif.className = `notification notif-${type}`;
        notif.innerHTML = `${type === 'success' ? '✅' : '❌'} <span>${message}</span>`;
        container.appendChild(notif);
        setTimeout(() => {
            notif.style.animation = 'slideOut 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
            setTimeout(() => notif.remove(), 300);
        }, 3000);
    };

    // --- AUTENTICACIÓN ---
    onAuthStateChanged(auth, (user) => {
        const overlay = document.getElementById('login-overlay');
        const appContent = document.getElementById('app-content');
        if (user) {
            currentUser = user;
            overlay.style.display = 'none';
            appContent.style.display = 'grid';
            iniciarSincronizacion();
        } else {
            currentUser = null;
            overlay.style.display = 'flex';
            appContent.style.display = 'none';
            if (unsubscribeBs) unsubscribeBs();
            if (unsubscribeGastos) unsubscribeGastos();
        }
    });

    window.login = async () => {
        const emailInput = document.getElementById('login-email');
        const passwordInput = document.getElementById('login-password');
        const errorDiv = document.getElementById('login-error');
        
        let email = emailInput.value.trim();
        const password = passwordInput.value;
        
        if (!email || !password) {
            errorDiv.innerText = "Ingresa usuario y contraseña";
            errorDiv.style.display = 'block';
            return;
        }

        // Si el usuario no escribe arroba, asume que es el correo fantasma
        if(!email.includes('@')) {
            email = `${email.toLowerCase()}@vpmcaja.com`;
        }

        try {
            await signInWithEmailAndPassword(auth, email, password);
            errorDiv.style.display = 'none';
            emailInput.value = '';
            passwordInput.value = '';
            showNotification('Sesión iniciada correctamente', 'success');
        } catch (error) {
            errorDiv.innerText = "Credenciales incorrectas";
            errorDiv.style.display = 'block';
            console.error(error);
        }
    };

    window.logout = async () => {
        if(confirm("¿Estás seguro de desconectar tu cuenta?")) {
            await signOut(auth);
            showNotification('Sesión cerrada', 'success');
        }
    };

    // --- MODAL Y CREACIÓN DE USUARIOS (ADMIN) ---
    window.abrirModalAdmin = () => {
        document.getElementById('modal-admin').style.display = 'flex';
    };

    window.cerrarModalAdmin = () => {
        document.getElementById('modal-admin').style.display = 'none';
        document.getElementById('nuevo-username').value = '';
        document.getElementById('nuevo-password').value = '';
    };

    window.ejecutarRegistroUsuario = async () => {
        const username = document.getElementById('nuevo-username').value.trim();
        const password = document.getElementById('nuevo-password').value;
        const rol = document.getElementById('nuevo-rol').value;

        if (!username || !password) {
            return showNotification("Llena todos los campos.", "error");
        }
        if (password.length < 6) {
            return showNotification("La contraseña debe tener mínimo 6 caracteres.", "error");
        }

        const emailFalso = `${username.toLowerCase()}@vpmcaja.com`;
        const btn = document.querySelector('#modal-admin .btn-admin');
        const originalText = btn.innerText;
        btn.innerText = "Registrando...";
        btn.disabled = true;

        try {
            // Se usa secondaryAuth para NO desloguear al admin
            const userCredential = await createUserWithEmailAndPassword(secondaryAuth, emailFalso, password);
            const newUser = userCredential.user;

            await setDoc(doc(db, "users", newUser.uid), {
                username: username,
                email: emailFalso,
                role: rol,
                createdAt: new Date().toISOString()
            });

            await signOut(secondaryAuth); // Cerramos la sesión secundaria por seguridad

            showNotification(`Usuario ${username} creado con éxito.`, "success");
            window.cerrarModalAdmin();
        } catch (error) {
            console.error("Error al registrar:", error);
            showNotification(error.message, "error");
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    };

    // --- SINCRONIZACIÓN CON FIRESTORE ---
    function iniciarSincronizacion() {
        // Escuchar Ingresos
        const qBs = query(collection(db, "ingresosBs"), orderBy("timestamp", "desc"));
        unsubscribeBs = onSnapshot(qBs, (snapshot) => {
            localDB.bs = [];
            snapshot.forEach((doc) => {
                localDB.bs.push({ fbId: doc.id, ...doc.data() });
            });
            actualizarUI();
        });

        // Escuchar Gastos
        const qGastos = query(collection(db, "gastos"), orderBy("timestamp", "desc"));
        unsubscribeGastos = onSnapshot(qGastos, (snapshot) => {
            localDB.gastos = [];
            snapshot.forEach((doc) => {
                localDB.gastos.push({ fbId: doc.id, ...doc.data() });
            });
            actualizarUI();
        });
    }

    // --- FUNCIONES DE UTILIDAD PARA MONTOS ---
    function parsearMonto(texto) {
        if (!texto) return 0;
        texto = texto.toString().trim();
        // Si el texto tiene punto y coma (ej. 1.500,50), formato venezolano
        if (texto.includes(',') && texto.indexOf(',') > texto.indexOf('.')) {
            return parseFloat(texto.replace(/\./g, '').replace(',', '.')) || 0;
        }
        // Si no, asume formato internacional (ej. 1500.50)
        return parseFloat(texto.replace(/[^\d.]/g, '')) || 0;
    }

    // --- PEGAR DESDE PORTAPAPELES (Banesco) ---
    window.pegarTodoDesdePortapapeles = async () => {
        try {
            const texto = await navigator.clipboard.readText();
            procesarTextoBanesco(texto);
        } catch(e) {
            showNotification("No se pudo leer el portapapeles. Usa Ctrl+V manual", "error");
        }
    };
    
    function procesarTextoBanesco(textoCompleto) {
        const refI = document.getElementById('bs-ref');
        const montoI = document.getElementById('bs-monto');
        refI.value = ''; montoI.value = '';
        
        let refEncontrada = null, montoEncontrado = null;
        const lineas = textoCompleto.split(/[\r\n]+/).map(l => l.trim()).filter(l => l);
        
        if (lineas.length >= 2) {
            if (/^\d{8,}$/.test(lineas[0])) refEncontrada = lineas[0];
            if ((lineas[1].includes('.') || lineas[1].includes(',')) && !/^\d{8,}$/.test(lineas[1])) montoEncontrado = lineas[1];
        }
        
        if (!refEncontrada || !montoEncontrado) {
            const partes = textoCompleto.replace(/[\r\n]+/g, ' ').trim().split(/\s+/).filter(p => p);
            if (partes.length >= 2) {
                if (/^\d{8,}$/.test(partes[0]) && !refEncontrada) refEncontrada = partes[0];
                if ((partes[1].includes('.') || partes[1].includes(',')) && !/^\d{8,}$/.test(partes[1]) && !montoEncontrado) montoEncontrado = partes[1];
            }
        }
        
        if (refEncontrada) { refI.value = refEncontrada; refI.classList.add('pegado-exito'); }
        if (montoEncontrado) { montoI.value = montoEncontrado; montoI.classList.add('pegado-exito'); }
        
        setTimeout(() => {
            refI.classList.remove('pegado-exito');
            montoI.classList.remove('pegado-exito');
        }, 1000);

        if (refEncontrada || montoEncontrado) {
            showNotification("Datos extraídos", "success");
        } else {
            showNotification("Formato no reconocido", "error");
        }
    }

    // --- REGISTRO DE DATOS A FIRESTORE ---
    window.registrarBs = async () => {
        const montoI = document.getElementById('bs-monto');
        const refI = document.getElementById('bs-ref');
        const sede = document.getElementById('bs-sede').value;
        const msgError = document.getElementById('msg-error-global');
        
        const monto = parsearMonto(montoI.value);
        const ref = refI.value.trim();
        
        if (!monto || !ref) return showNotification("Faltan datos de ingreso", "error");

        const duplicado = localDB.bs.find(x => x.ref === ref && x.fbId !== editandoBsID);
        if (duplicado) {
            msgError.innerText = `❌ LA REFERENCIA ${ref} YA EXISTE EN: ${duplicado.sede.toUpperCase()}`;
            msgError.style.display = 'block';
            setTimeout(() => msgError.style.display = 'none', 6000);
            return;
        }

        const btn = document.getElementById('btn-bs');
        btn.disabled = true;
        btn.innerText = "Guardando...";

        const hora = new Date().toLocaleTimeString('es-VE', { hour: '2-digit', minute: '2-digit' });
        const data = { monto, ref, sede, hora, timestamp: Date.now(), user: currentUser.email };

        try {
            if (editandoBsID) {
                // Actualizar en Firestore NO implementado aún en este snippet, 
                // para mantener la estructura simple, lo agregamos como nuevo y borramos el viejo
                await deleteDoc(doc(db, "ingresosBs", editandoBsID));
                await addDoc(collection(db, "ingresosBs"), data);
                editandoBsID = null;
            } else {
                await addDoc(collection(db, "ingresosBs"), data);
            }
            montoI.value = ''; refI.value = '';
            showNotification("Ingreso guardado en la nube", "success");
        } catch (error) {
            console.error(error);
            showNotification("Error al guardar en la nube", "error");
        } finally {
            btn.disabled = false;
            btn.innerText = "Guardar Ingreso";
        }
    };

    window.registrarGasto = async () => {
        const montoI = document.getElementById('g-monto');
        const moneda = document.getElementById('g-moneda').value;
        const tipo = document.getElementById('g-tipo').value;
        const conceptoI = document.getElementById('g-concepto');
        const sede = document.getElementById('g-sede').value;
        
        const monto = parsearMonto(montoI.value);
        const concepto = conceptoI.value.trim();

        if (!monto || !concepto) return showNotification("Faltan datos de gasto", "error");

        const btn = document.getElementById('btn-gasto');
        btn.disabled = true;
        btn.innerText = "Guardando...";

        const hora = new Date().toLocaleTimeString('es-VE', { hour: '2-digit', minute: '2-digit' });
        const data = { monto, moneda, tipo, concepto, sede, hora, timestamp: Date.now(), user: currentUser.email };

        try {
            await addDoc(collection(db, "gastos"), data);
            montoI.value = ''; conceptoI.value = '';
            showNotification("Gasto guardado en la nube", "success");
        } catch (error) {
            console.error(error);
            showNotification("Error al guardar gasto", "error");
        } finally {
            btn.disabled = false;
            btn.innerText = "Registrar Gasto";
        }
    };

    // --- INTERFAZ ---
    window.actualizarUI = () => {
        // Filtros Ingresos
        const fSedeBs = document.getElementById('filtro-sede-bs').value;
        const fRef = document.getElementById('buscador-bs').value.toLowerCase();
        const filtradosBs = localDB.bs.filter(i => (fSedeBs === "Todas" || i.sede === fSedeBs) && i.ref.toLowerCase().includes(fRef));
        
        document.getElementById('lista-bs').innerHTML = filtradosBs.map(i => `
            <div class="item item-bs">
                <div class="item-header">
                    <span class="item-sede">${i.sede}</span>
                    <span class="item-monto monto-bs">${fmtBs(i.monto)}</span>
                </div>
                <div class="item-details">Ref: <b>${i.ref}</b></div>
                <div class="item-meta">
                    <span class="time-label">🕒 ${i.hora}</span>
                    <div style="display:flex; gap:5px;">
                        <button class="btn-action btn-edit" onclick="gestionarBs('${i.fbId}', '${i.ref}', ${i.monto}, '${i.sede}')">✏️</button>
                        <button class="btn-action btn-delete" onclick="eliminarDoc('ingresosBs', '${i.fbId}')">🗑️</button>
                    </div>
                </div>
            </div>`).join('');

        // Filtros Gastos
        const fSedeG = document.getElementById('filtro-sede-g').value;
        const filtradosG = localDB.gastos.filter(i => (fSedeG === "Todas" || i.sede === fSedeG));

        document.getElementById('lista-gastos').innerHTML = filtradosG.map(i => `
            <div class="item item-gasto">
                <div class="item-header">
                    <span class="item-sede">${i.sede}</span>
                    <span class="item-monto monto-gasto">${i.moneda === 'USD' ? fmtUsd(i.monto) : fmtBs(i.monto)}</span>
                </div>
                <div class="item-details" style="color:var(--primary-dark); font-weight:600;">${i.tipo}</div>
                <div class="item-details"><i>"${i.concepto}"</i></div>
                <div class="item-meta">
                    <span class="time-label">🕒 ${i.hora}</span>
                    <button class="btn-action btn-delete" onclick="eliminarDoc('gastos', '${i.fbId}')">🗑️</button>
                </div>
            </div>`).join('');

        // Totales Resumen
        let tIngresosBs = 0, tGastosBs = 0, tGastosUsd = 0;
        const resDiv = document.getElementById('resumen-final'); 
        resDiv.innerHTML = '';
        
        sedes.forEach(s => {
            const ingBsSede = localDB.bs.filter(x => x.sede === s).reduce((a,b) => a+b.monto, 0);
            const gasBsSede = localDB.gastos.filter(x => x.sede === s && x.moneda === 'BS').reduce((a,b) => a+b.monto, 0);
            const gasUsdSede = localDB.gastos.filter(x => x.sede === s && x.moneda === 'USD').reduce((a,b) => a+b.monto, 0);
            
            tIngresosBs += ingBsSede; tGastosBs += gasBsSede; tGastosUsd += gasUsdSede;
            
            if(ingBsSede > 0 || gasBsSede > 0 || gasUsdSede > 0) {
                resDiv.innerHTML += `
                    <div class="resumen-sede-card">
                        <div class="resumen-sede-info">
                            <div class="resumen-sede-nombre">${s}</div>
                            <div class="resumen-sede-cifras">
                                <span style="color:var(--success)">Ingresos: ${fmtBs(ingBsSede)}</span><br>
                                <span style="color:var(--warning)">Gastos: ${fmtBs(gasBsSede)} | ${fmtUsd(gasUsdSede)}</span>
                            </div>
                        </div>
                        <div class="badge-cantidad">${localDB.bs.filter(x => x.sede === s).length}</div>
                    </div>`;
            }
        });

        document.getElementById('tot-ingresos').innerText = fmtBs(tIngresosBs);
        document.getElementById('tot-gastos-bs').innerText = fmtBs(tGastosBs);
        document.getElementById('tot-gastos-usd').innerText = fmtUsd(tGastosUsd);
    };

    // --- ACCIONES SECUNDARIAS ---
    window.gestionarBs = (fbId, ref, monto, sede) => {
        if (confirm(`¿Deseas EDITAR la Referencia: ${ref}?`)) {
            document.getElementById('bs-monto').value = monto.toLocaleString('es-VE', { minimumFractionDigits: 2 });
            document.getElementById('bs-ref').value = ref;
            document.getElementById('bs-sede').value = sede;
            editandoBsID = fbId;
            document.getElementById('btn-bs').innerText = "ACTUALIZAR REGISTRO";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    };

    window.eliminarDoc = async (coleccion, id) => {
        if (confirm("⚠️ ¿Eliminar este registro de la nube?")) {
            try {
                await deleteDoc(doc(db, coleccion, id));
                showNotification("Registro eliminado", "success");
            } catch (error) {
                console.error(error);
                showNotification("Error al eliminar", "error");
            }
        }
    };

    window.reiniciarDia = () => {
        if (confirm("⚠️ OJO: Esto solo limpia las variables en pantalla (NO borra la base de datos de Firebase). Ideal si quieres ver la pantalla en blanco. ¿Continuar?")) {
            localDB = { bs: [], gastos: [] };
            actualizarUI();
            showNotification("Pantalla limpiada", "success");
        }
    };

    window.abrirBanco = () => {
        window.open('https://www.banesconline.com/Mantis/WebSite/login.aspx', 'banesco', 'width=1200,height=800');
    };

    // --- EXPORTAR PDF ---
    window.exportarPDF = () => {
        if (typeof window.jspdf === 'undefined') {
            showNotification('Error: jsPDF no cargó', "error"); return;
        }
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(18); doc.setTextColor(30, 41, 59);
        doc.text("REPORTE CONSOLIDADO - VPM CAJA PRO", 14, 20);
        
        doc.setFontSize(10); doc.setTextColor(100);
        doc.text(`Generado: ${new Date().toLocaleString('es-VE')} por ${currentUser?.email || 'Usuario'}`, 14, 28);

        doc.setFontSize(14); doc.setTextColor(16, 185, 129);
        doc.text("1. RESUMEN INGRESOS BANESCO POR SEDE", 14, 40);
        
        const resumenCuerpo = sedes.map(s => {
            const rS = localDB.bs.filter(x => x.sede === s).reduce((a,b) => a+b.monto, 0);
            return [s, fmtBs(rS), localDB.bs.filter(x => x.sede === s).length];
        });

        doc.autoTable({
            startY: 45, head: [['Sede', 'Total Ingresos (Bs)', 'Cant. Transacciones']],
            body: resumenCuerpo, theme: 'striped',
            headStyles: { fillColor: [16, 185, 129] }, styles: { fontSize: 9 }
        });

        let currentY = doc.lastAutoTable.finalY + 15;
        doc.setFontSize(14); doc.setTextColor(245, 158, 11);
        doc.text("2. RESUMEN DE GASTOS POR SEDE", 14, currentY);

        const resumenGastosCuerpo = sedes.map(s => {
            const gBs = localDB.gastos.filter(x => x.sede === s && x.moneda === 'BS').reduce((a,b) => a + b.monto, 0);
            const gUsd = localDB.gastos.filter(x => x.sede === s && x.moneda === 'USD').reduce((a,b) => a + b.monto, 0);
            return [s, fmtBs(gBs), fmtUsd(gUsd)];
        });

        doc.autoTable({ 
            startY: currentY + 5, 
            head: [['Sede / Local', 'Total Gastos (Bs)', 'Total Gastos ($)']], 
            body: resumenGastosCuerpo, theme: 'striped', 
            headStyles: { fillColor: [217, 119, 6] }, styles: { fontSize: 9 }
        });

        currentY = doc.lastAutoTable.finalY + 15;
        if (currentY > 250) { doc.addPage(); currentY = 20; }
        
        doc.setFontSize(14); doc.setTextColor(30, 41, 59); 
        doc.text("3. DETALLE DE GASTOS", 14, currentY);
        
        const gastosCuerpo = localDB.gastos.map(x => {
            const formatMonto = x.moneda === 'USD' ? fmtUsd(x.monto) : fmtBs(x.monto);
            return [x.sede, x.hora, x.tipo, x.concepto, formatMonto];
        });

        doc.autoTable({ 
            startY: currentY + 5,
            head: [['Sede', 'Hora', 'Categoría', 'Concepto', 'Monto']],
            body: gastosCuerpo, theme: 'grid',
            headStyles: { fillColor: [71, 85, 105] }, styles: { fontSize: 8 }
        });

        window.open(doc.output('bloburl'), '_blank');
    };
</script>
